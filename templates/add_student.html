<!DOCTYPE html>
<html>
<head>
  <title>Add Student | Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">
  <h2>Add Student</h2>
  <p class="subtitle">Admin Panel</p>

  <form method="post">
    <input type="text" name="admission_id" placeholder="Admission ID" required>
    <input type="text" name="student_name" placeholder="Student Name" required>

    {% if is_staff %}
      <input type="text" value="{{ staff_department }}" readonly>
      <input type="hidden" name="branch" value="{{ staff_department }}">
    {% else %}
      <select name="branch">
        <option>Computer Engineering</option>
        <option>Electronics & Communication</option>
        <option>Mechanical</option>
        <option>Automobile</option>
      </select>
    {% endif %}

    <input type="text" name="year_sem" placeholder="Year / Semester">
    <input type="text" name="mobile" placeholder="Mobile Number">
    <div class="password-wrapper">
      <input type="password" id="student_password" name="password" class="preserve-case" placeholder="Set Password" required autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" autocomplete="new-password">
      <button type="button" class="toggle-password" onclick="togglePassword('student_password', this)" aria-label="Show password" title="Show password">
        <span aria-hidden="true">&#128065;</span>
      </button>
    </div>

    <button type="submit">Add Student</button>
  </form>

  <a class="link" href="/admin">⬅ Back to Dashboard</a>
</div>

<script>
  function togglePassword(fieldId, toggleButton) {
    const passwordField = document.getElementById(fieldId);
    if (!passwordField) return;

    if (passwordField.type === "password") {
      passwordField.type = "text";
      toggleButton.setAttribute("aria-label", "Hide password");
      toggleButton.setAttribute("title", "Hide password");
    } else {
      passwordField.type = "password";
      toggleButton.setAttribute("aria-label", "Show password");
      toggleButton.setAttribute("title", "Show password");
    }
  }
</script>

</body>
</html>
