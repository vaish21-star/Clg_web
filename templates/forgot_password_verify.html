<!DOCTYPE html>
<html>
<head>
  <title>{{ role_name }} Password Reset | SVP</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="card">
    <h2>{{ role_name }} Reset Verification</h2>
    <p class="subtitle">{{ email }}</p>
    {% if error %}<p style="color:#c62828">{{ error }}</p>{% endif %}
    <form method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="email" value="{{ email }}">
      <input type="text" name="otp" placeholder="6-digit OTP" required>
      <div class="password-wrapper">
        <input type="password" id="new_password" name="new_password" class="preserve-case" placeholder="New Password" required autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" autocomplete="new-password">
        <button type="button" class="toggle-password" onclick="togglePassword('new_password', this)" aria-label="Show password" title="Show password">
          <span aria-hidden="true">&#128065;</span>
        </button>
      </div>
      <div class="password-wrapper">
        <input type="password" id="confirm_password" name="confirm_password" class="preserve-case" placeholder="Confirm Password" required autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" autocomplete="new-password">
        <button type="button" class="toggle-password" onclick="togglePassword('confirm_password', this)" aria-label="Show password" title="Show password">
          <span aria-hidden="true">&#128065;</span>
        </button>
      </div>
      <button type="submit">Reset Password</button>
    </form>
    {% if role_name == "Student" %}
      <a class="link" href="/login/student">Back</a>
    {% else %}
      <a class="link" href="/login/staff">Back</a>
    {% endif %}
  </div>
<script>
  function togglePassword(fieldId, toggleButton) {
    const passwordField = document.getElementById(fieldId);
    if (!passwordField) return;

    if (passwordField.type === "password") {
      passwordField.type = "text";
      toggleButton.setAttribute("aria-label", "Hide password");
      toggleButton.setAttribute("title", "Hide password");
    } else {
      passwordField.type = "password";
      toggleButton.setAttribute("aria-label", "Show password");
      toggleButton.setAttribute("title", "Show password");
    }
  }
</script>
</body>
</html>
