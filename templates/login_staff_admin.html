<!DOCTYPE html>
<html>
<head>
  <title>Admin / Staff Login | SVP</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="card">
    <h2>Admin / Staff Login</h2>
    <p class="subtitle">Staff can login using Gmail and password</p>
    {% if error %}<p style="color:#c62828">{{ error }}</p>{% endif %}
    <form method="post">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
      <select name="login_type">
        <option value="staff">Staff</option>
        <option value="admin">Admin</option>
      </select>
      <input type="text" name="login_id" class="preserve-case" placeholder="Gmail / Admin Username" required>
      <div class="password-wrapper">
        <input type="password" id="staff_login_password" name="password" class="preserve-case" placeholder="Password" required autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" autocomplete="current-password">
        <button type="button" class="toggle-password" onclick="togglePassword('staff_login_password', this)" aria-label="Show password" title="Show password">
          <span aria-hidden="true">&#128065;</span>
        </button>
      </div>
      <button type="submit">Login</button>
    </form>
    <a class="link" href="/staff/register">Register Staff (Name + Department + Gmail OTP)</a>
    <a class="link" href="/forgot-password/staff">Forgot Password?</a>
    <a class="link" href="/login">Back</a>
  </div>
<script>
  function togglePassword(fieldId, toggleButton) {
    const passwordField = document.getElementById(fieldId);
    if (!passwordField) return;

    if (passwordField.type === "password") {
      passwordField.type = "text";
      toggleButton.setAttribute("aria-label", "Hide password");
      toggleButton.setAttribute("title", "Hide password");
    } else {
      passwordField.type = "password";
      toggleButton.setAttribute("aria-label", "Show password");
      toggleButton.setAttribute("title", "Show password");
    }
  }
</script>
</body>
</html>
