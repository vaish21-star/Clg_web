<!DOCTYPE html>
<html>
<head>
  <title>Edit Student | Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="card add-employee-card">
    <h2>Edit Student</h2>
    <p class="subtitle">Update student details</p>

    <form method="post" class="add-employee-form">
      <input type="text" name="student_name" class="preserve-case" placeholder="Student Name" value="{{ student.student_name }}" required>

      <select name="branch" class="preserve-case" required>
        <option value="Automobile Engineering" {% if student.branch == "Automobile Engineering" %}selected{% endif %}>Automobile Engineering</option>
        <option value="Computer Science and Engineering" {% if student.branch == "Computer Science and Engineering" %}selected{% endif %}>Computer Science and Engineering</option>
        <option value="Electronics and Communication Engineering" {% if student.branch == "Electronics and Communication Engineering" %}selected{% endif %}>Electronics and Communication Engineering</option>
        <option value="Mechanical Engineering" {% if student.branch == "Mechanical Engineering" %}selected{% endif %}>Mechanical Engineering</option>
      </select>

      <input type="text" name="mobile" class="preserve-case" placeholder="Mobile Number" value="{{ student.mobile }}" required>
      <input type="text" name="college_reg_no" class="preserve-case" placeholder="College Reg No" value="{{ student.college_reg_no }}">
      <input type="text" name="admission_year" class="preserve-case" value="{{ student.admission_year if student.admission_year else '' }}" readonly>
      <input type="number" name="year_sem" min="1" max="6" placeholder="Manual Semester Override (1-6)" value="{{ student.year_sem if student.year_sem else '' }}">

      <select name="gender" class="preserve-case">
        <option value="">Select Gender</option>
        <option value="Male" {% if student.gender == "Male" %}selected{% endif %}>Male</option>
        <option value="Female" {% if student.gender == "Female" %}selected{% endif %}>Female</option>
        <option value="Other" {% if student.gender == "Other" %}selected{% endif %}>Other</option>
      </select>

      <input type="text" name="caste_category" class="preserve-case" placeholder="Caste Category" value="{{ student.caste_category }}">
      <input type="text" name="alloted_category" class="preserve-case" placeholder="Alloted Category" value="{{ student.alloted_category }}" {% if not can_set_alloted_category %}readonly{% endif %}>
      {% if not can_set_alloted_category %}
      <small>Only Admin/Management can update Alloted Category.</small>
      {% endif %}
      <input type="text" name="register_number" class="preserve-case" placeholder="Qualifying Exam Reg No" value="{{ student.register_number }}">
      <input type="email" name="student_email" class="preserve-case" placeholder="Email ID" value="{{ student.student_email }}" {% if not can_edit_identity_ids %}readonly{% endif %}>
      <input type="text" name="ssp_id" class="preserve-case" placeholder="SSP ID" value="{{ student.ssp_id }}" {% if not can_edit_identity_ids %}readonly{% endif %}>
      <input type="text" name="apaar_id" class="preserve-case" placeholder="APAAR ID" value="{{ student.apaar_id }}" {% if not can_edit_identity_ids %}readonly{% endif %}>
      {% if not can_edit_identity_ids %}
      <small>Only Admin/HOD can update Email ID, SSP ID, and APAAR ID.</small>
      {% endif %}
      <input type="number" name="total_marks_obtained" placeholder="Total Marks Obtained" value="{{ student.total_marks_obtained if student.total_marks_obtained is not none else '' }}">
      <input type="number" name="total_max_marks" placeholder="Total Max Marks" value="{{ student.total_max_marks if student.total_max_marks is not none else '' }}">
      <input type="number" name="science_marks_obtained" placeholder="Science Marks Obtained" value="{{ student.science_marks_obtained if student.science_marks_obtained is not none else '' }}">
      <input type="number" name="science_max_marks" placeholder="Science Max Marks" value="{{ student.science_max_marks if student.science_max_marks is not none else '' }}">
      <input type="number" name="maths_marks_obtained" placeholder="Maths Marks Obtained" value="{{ student.maths_marks_obtained if student.maths_marks_obtained is not none else '' }}">
      <input type="number" name="maths_max_marks" placeholder="Maths Max Marks" value="{{ student.maths_max_marks if student.maths_max_marks is not none else '' }}">

      <button type="submit" class="save-employee-btn">Update Student</button>
    </form>

    <a class="link" href="/admin/student-details">Back to Student Details</a>
  </div>
</body>
</html>
